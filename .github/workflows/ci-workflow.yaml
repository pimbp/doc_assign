name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build and test backend (Maven)
        working-directory: ./Backend/demo/demo
        run: |
          mvn -B -DskipTests=false clean test package

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and build frontend
        working-directory: ./React/via_tab
        run: |
          npm ci
          npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build backend Docker image
        run: |
          docker build -t 354793/assign-backend:latest ./Backend/demo/demo

      - name: Build frontend Docker image
        run: |
          docker build -t 354793/assign-frontend:latest ./React/via_tab