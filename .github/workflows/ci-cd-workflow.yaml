name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build backend (Maven)
        working-directory: ./Backend/demo/demo
        run: |
            mvn -B -DskipTests=true clean package


      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and build frontend
        working-directory: ./React/via_tab
        run: |
          npm ci
          npm run build

      - name: Build backend Docker image
        run: |
          docker build -t 354793/assign-backend:latest ./Backend/demo/demo

      - name: Build frontend Docker image
        run: |
          docker build -t 354793/assign-frontend:latest ./React/via_tab
  cd:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Start Minikube
        uses: medyagh/setup-minikube@latest

      - name: Build images in Minikube Docker daemon
        run: |
          eval $(minikube docker-env)
          docker build -t assign-backend:latest ./backend
          docker build -t assign-frontend:latest ./frontend

      - name: Apply Kubernetes resources
        run: |
          kubectl apply -f k8s/postgres-pv.yaml
          kubectl apply -f k8s/postgres-pvc.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/postgres --timeout=120s
          kubectl rollout status deployment/backend --timeout=120s
          kubectl rollout status deployment/frontend --timeout=120s

      - name: Verify pods are running
        run: kubectl get pods