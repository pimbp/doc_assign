services:
  postgres:
    image: postgres:16-alpine
    container_name: assign-postgres
    environment:
      POSTGRES_DB: assign_db
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d assign_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./Backend/demo/demo
      dockerfile: Dockerfile
    container_name: assign-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/assign_db
      SPRING_DATASOURCE_USERNAME: appuser
      SPRING_DATASOURCE_PASSWORD: apppass
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "true"
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./React/via_tab
      dockerfile: ./Dockerfile
    environment:
      NODE_ENV: production
    ports:
    - "3000:3000" #computer port : container port

volumes:
  pgdata: